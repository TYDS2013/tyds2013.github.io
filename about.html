<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - 我的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- 加载动画遮罩（与全局一致） -->
<div id="loader">
    <svg class="pl" width="240" height="240" viewBox="0 0 240 240">
        <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
    </svg>
</div>

<div class="container">
    <!-- 顶部栏：时间 + 主题切换 -->
    <div class="top-bar">
        <div id="clock"></div>
        <div class="theme-toggle" id="themeToggle">
            <button data-theme="light">☀️ 亮</button>
            <button data-theme="dark">🌙 暗</button>
        </div>
    </div>

    <!-- 导航 -->
    <nav class="top-nav">
        <a href="index.html">主页</a>
        <a href="all-articles.html">文章</a>
        <a href="about.html" class="active">关于</a>
        <a href="resources.html">资料</a>
        <a href="404.html">404 Page</a>
    </nav>

    <!-- 关于内容 -->
    <div class="page-content">
        <h2>👋 关于我</h2>
        <p style="margin-top:16px; font-size:1.1rem;">
            这里是关于页面。可以填写个人介绍、博客宗旨、技术栈或联系方式等。
        </p>
        <p style="margin-top:12px;">
            <strong>📧 邮箱：</strong> example@mail.com<br>
            <strong>🐦 社交媒体：</strong> 可在此放置链接
        </p>
        <p style="margin-top:20px; color:var(--text-secondary);">
            本博客使用纯静态技术构建，文章以 Markdown 编写，托管于 GitHub Pages。
        </p>
    </div>

    <!-- 后台入口 -->
    <div style="text-align:right; margin-top:30px;">
        <a href="admin.html" style="background:transparent; border:1px solid var(--border-color); padding:4px 18px; border-radius:30px; display:inline-block; font-size:0.8rem; color:var(--text-secondary);">🔐 后台</a>
    </div>

    <!-- 底部 -->
    <div class="footer">
        © 2026 我的个人博客 · 保留所有权利
        <div class="update-date">最后更新：<span id="updateDate"></span></div>
    </div>
</div>

<div id="backTop">↑</div>

<script src="js/common.js"></script>
<script>
    // 设置更新日期
    document.getElementById('updateDate').textContent = new Date().toLocaleDateString('zh-CN');
</script>
</body>
</html>
