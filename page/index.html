<script>
  (function () {
    const bar = document.getElementById('loading-bar');
    const container = document.getElementById('loading-bar-container');
    if (!bar || !container) return;

    const startTime = Date.now();
    let progress = 0;
    let updateTimer = null;
    let isCompleted = false;

    function getTargetProgress(elapsedMs) {
      const timeConstant = 2000;
      const maxAutoProgress = 92;
      return maxAutoProgress * (1 - Math.exp(-elapsedMs / timeConstant));
    }

    function updateProgress() {
      if (isCompleted) return;
      const elapsed = Date.now() - startTime;
      const target = getTargetProgress(elapsed);
      progress += (target - progress) * 0.35;
      const displayProgress = Math.min(progress, 92);
      bar.style.width = displayProgress + '%';
    }

    function completeLoading() {
      if (isCompleted) return;
      isCompleted = true;
      if (updateTimer) {
        clearInterval(updateTimer);
        updateTimer = null;
      }
      bar.style.width = '100%';
      setTimeout(() => {
        container.classList.add('loading-bar-done');
      }, 280);
      setTimeout(() => {
        if (container.parentNode) {
          container.parentNode.removeChild(container);
        }
      }, 750);
    }

    updateTimer = setInterval(updateProgress, 180);
    updateProgress();

    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        completeLoading();
      });
    });

    setTimeout(() => {
      if (!isCompleted) completeLoading();
    }, 15000);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !isCompleted) {
        updateProgress();
      }
    });
  })();
</script>

<script>
    (function() {
        const timeDisplay = document.getElementById('timeDisplay');
        const dateDisplay = document.getElementById('dateDisplay');
        const clockWidget = document.getElementById('ledClock');

        
        const digitSegmentMap = {
            0: { a: true, b: true, c: true, d: true, e: true, f: true, g: false },
            1: { a: false, b: true, c: true, d: false, e: false, f: false, g: false },
            2: { a: true, b: true, c: false, d: true, e: true, f: false, g: true },
            3: { a: true, b: true, c: true, d: true, e: false, f: false, g: true },
            4: { a: false, b: true, c: true, d: false, e: false, f: true, g: true },
            5: { a: true, b: false, c: true, d: true, e: false, f: true, g: true },
            6: { a: true, b: false, c: true, d: true, e: true, f: true, g: true },
            7: { a: true, b: true, c: true, d: false, e: false, f: false, g: false },
            8: { a: true, b: true, c: true, d: true, e: true, f: true, g: true },
            9: { a: true, b: true, c: true, d: true, e: false, f: true, g: true },
        };

        const segmentClasses = ['seg-a', 'seg-b', 'seg-c', 'seg-d', 'seg-e', 'seg-f', 'seg-g'];
        const segmentKeys = ['a', 'b', 'c', 'd', 'e', 'f', 'g'];

        let digitElements = [];

        function createDigitHTML() {
            const digitDiv = document.createElement('div');
            digitDiv.className = 'led-digit';
            segmentClasses.forEach(cls => {
                const seg = document.createElement('div');
                seg.className = 'led-segment ' + cls;
                digitDiv.appendChild(seg);
            });
            return digitDiv;
        }

        function createColonHTML() {
            const colonDiv = document.createElement('div');
            colonDiv.className = 'led-colon';
            const dot1 = document.createElement('div');
            dot1.className = 'led-colon-dot';
            const dot2 = document.createElement('div');
            dot2.className = 'led-colon-dot';
            colonDiv.appendChild(dot1);
            colonDiv.appendChild(dot2);
            return colonDiv;
        }

        function buildClockStructure() {
            timeDisplay.innerHTML = '';
            digitElements = [];
            for (let i = 0; i < 6; i++) {
                const digitEl = createDigitHTML();
                digitElements.push(digitEl);
                timeDisplay.appendChild(digitEl);
                if (i === 1 || i === 3) {
                    const colonEl = createColonHTML();
                    timeDisplay.appendChild(colonEl);
                }
            }
        }

        function updateDigit(digitElement, value) {
            const segments = digitElement.querySelectorAll('.led-segment');
            const segMap = digitSegmentMap[value];
            segments.forEach((seg, index) => {
                const key = segmentKeys[index];
                seg.classList.toggle('on', segMap[key]);
            });
        }

        function setAllDigits(value) {
            digitElements.forEach(el => updateDigit(el, value));
        }

        function updateAllDigits(hours, minutes, seconds) {
            const timeStr =
                String(hours).padStart(2, '0') +
                String(minutes).padStart(2, '0') +
                String(seconds).padStart(2, '0');
            for (let i = 0; i < 6; i++) {
                updateDigit(digitElements[i], parseInt(timeStr[i], 10));
            }
        }

        function updateDate(now) {
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[now.getDay()];
            dateDisplay.textContent = `${year}年${month}月${day}日 星期${weekday}`;
        }

        function updateClock() {
            const now = new Date();
            updateAllDigits(now.getHours(), now.getMinutes(), now.getSeconds());
            updateDate(now);
        }

        
        function bootAnimation() {
            
            setAllDigits(8);
            
            clockWidget.classList.add('boot-focus');

            
            setTimeout(() => {
                clockWidget.classList.remove('boot-focus');
                updateClock();
                
                const msUntilNextSecond = 1000 - new Date().getMilliseconds();
                setTimeout(() => {
                    updateClock();
                    setInterval(updateClock, 1000);
                }, msUntilNextSecond);
            }, 2500);
        }

        
        buildClockStructure();
        bootAnimation();

        window.ledClock = {
            update: updateClock,
            getWidget: () => clockWidget,
        };
        console.log('✅ CJYG CLCITY 电子时钟已启动（聚焦清晰动画）');
    })();
</script>

        --led-color: #2c2c2c;
        --led-glow: rgba(0,0,0,0.08);
        --led-dim: rgba(0, 0, 0, 0.04);
        --panel-bg: #f5f5f5;
        --panel-border: #dcdcdc;
        --colon-color: #2c2c2c;
        --text-label: #777;
        --text-date: #555;
        --panel-shadow: 0 2px 12px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.05);
        --segment-on-shadow: inset 0 1px 2px rgba(255,255,255,0.7), 0 1px 2px rgba(0,0,0,0.08);
        --colon-dot-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

     
    @media (prefers-color-scheme: dark) {
        :root {
            --led-color: #00e5ff;
            --led-glow: rgba(0, 229, 255, 0.6);
            --led-dim: rgba(0, 229, 255, 0.08);
            --panel-bg: #0a0f1a;
            --panel-border: #1a2233;
            --colon-color: #00e5ff;
            --text-label: rgba(200, 220, 255, 0.6);
            --text-date: #00e5ff;
            --panel-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 60px rgba(0,150,255,0.1);
            --segment-on-shadow: 0 0 4px var(--led-glow), 0 0 10px var(--led-glow), inset 0 1px 0 rgba(255,255,255,0.25);
            --colon-dot-shadow: 0 0 5px var(--led-glow), 0 0 12px var(--led-glow), 0 0 20px var(--led-glow);
        }
         
        .led-clock-widget:not(.boot-focus) .led-colon-dot {
            animation: colon-blink 2s step-end infinite;
        }
        .led-clock-widget:not(.boot-focus) .led-segment.on {
            animation: segment-flicker 4s infinite alternate;
        }
    }

    @keyframes segment-flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.93; }
        97% { opacity: 1; }
        98% { opacity: 0.95; }
        99% { opacity: 1; }
    }
    @keyframes colon-blink {
        0%, 44% { opacity: 1; }
        45%, 94% { opacity: 0.1; }
        95%, 100% { opacity: 1; }
    }

     
    @keyframes focusIn {
        0% {
            filter: blur(12px);
            opacity: 0.2;
            transform: scale(1.04);
        }
        70% {
            filter: blur(2px);
            opacity: 0.85;
            transform: scale(1.01);
        }
        100% {
            filter: blur(0);
            opacity: 1;
            transform: scale(1);
        }
    }

     
    .boot-focus .led-segment,
    .boot-focus .led-colon-dot {
        animation: focusIn 2.5s ease-out forwards;
    }

     
    :root {
        --digit-width: 40px;
        --digit-height: 66px;
        --digit-gap: 5px;
        --colon-width: 12px;
        --h-seg-width: 32px;
        --h-seg-height: 6px;
        --v-seg-width: 6px;
        --v-seg-height: 26px;
    }

    .led-clock-widget {
        display: inline-block;
        background: var(--panel-bg);
        border: 2px solid var(--panel-border);
        border-radius: 16px;
        padding: 20px 18px 16px;
        box-shadow: var(--panel-shadow);
        user-select: none;
        -webkit-user-select: none;
        max-width: 100%;
        box-sizing: border-box;
        transition: all 0.3s ease;
        position: relative;
    }

    .led-clock-label {
        text-align: center;
        font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo', monospace;
        font-size: 10px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--text-label);
        margin-bottom: 10px;
        text-shadow: none;
    }

    .led-clock-time {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--digit-gap);
        position: relative;
    }

    .led-digit {
        position: relative;
        width: var(--digit-width);
        height: var(--digit-height);
        flex-shrink: 0;
    }

    .led-segment {
        position: absolute;
        background: var(--led-dim);
        border-radius: 2px;
        transition: background 0.08s ease, box-shadow 0.08s ease;
        box-shadow: none;
    }

    .led-segment.on {
        background: var(--led-color);
        box-shadow: var(--segment-on-shadow);
    }

    .led-segment.seg-a { top: 1px; left: 4px; width: var(--h-seg-width); height: var(--h-seg-height); clip-path: polygon(9% 0%, 91% 0%, 100% 50%, 91% 100%, 9% 100%, 0% 50%); }
    .led-segment.seg-b { top: 4px; left: 33px; width: var(--v-seg-width); height: var(--v-seg-height); clip-path: polygon(50% 7%, 100% 15%, 100% 85%, 50% 93%, 0% 85%, 0% 15%); }
    .led-segment.seg-c { top: 32px; left: 33px; width: var(--v-seg-width); height: var(--v-seg-height); clip-path: polygon(50% 7%, 100% 15%, 100% 85%, 50% 93%, 0% 85%, 0% 15%); }
    .led-segment.seg-d { top: 56px; left: 4px; width: var(--h-seg-width); height: var(--h-seg-height); clip-path: polygon(9% 0%, 91% 0%, 100% 50%, 91% 100%, 9% 100%, 0% 50%); }
    .led-segment.seg-e { top: 32px; left: 1px; width: var(--v-seg-width); height: var(--v-seg-height); clip-path: polygon(50% 7%, 100% 15%, 100% 85%, 50% 93%, 0% 85%, 0% 15%); }
    .led-segment.seg-f { top: 4px; left: 1px; width: var(--v-seg-width); height: var(--v-seg-height); clip-path: polygon(50% 7%, 100% 15%, 100% 85%, 50% 93%, 0% 85%, 0% 15%); }
    .led-segment.seg-g { top: 28px; left: 4px; width: var(--h-seg-width); height: var(--h-seg-height); clip-path: polygon(9% 0%, 91% 0%, 100% 50%, 91% 100%, 9% 100%, 0% 50%); }

    .led-colon {
        position: relative;
        width: var(--colon-width);
        height: var(--digit-height);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
    }

    .led-colon-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--colon-color);
        box-shadow: var(--colon-dot-shadow);
        transition: all 0.1s;
    }

    .led-clock-date {
        text-align: center;
        margin-top: 14px;
        font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo', monospace;
        font-size: 13px;
        letter-spacing: 0.15em;
        color: var(--text-date);
        text-shadow: none;
        line-height: 1.4;
    }

     
    @media (max-width: 380px) {
        .led-clock-widget {
            padding: 14px 8px 10px;
            border-radius: 12px;
            --digit-width: 30px;
            --digit-height: 50px;
            --digit-gap: 3px;
            --colon-width: 9px;
            --h-seg-width: 24px;
            --h-seg-height: 4.5px;
            --v-seg-width: 4.5px;
            --v-seg-height: 19px;
        }
        .led-segment { border-radius: 1.5px; }
        .led-segment.seg-a { top: 1px; left: 3px; }
        .led-segment.seg-b { top: 3px; left: 25px; }
        .led-segment.seg-c { top: 24px; left: 25px; }
        .led-segment.seg-d { top: 42px; left: 3px; }
        .led-segment.seg-e { top: 24px; left: 1px; }
        .led-segment.seg-f { top: 3px; left: 1px; }
        .led-segment.seg-g { top: 21px; left: 3px; }
        .led-colon-dot { width: 4px; height: 4px; }
        .led-colon { gap: 11px; }
        .led-clock-date { font-size: 10px; margin-top: 10px; }
        .led-clock-label { font-size: 8px; margin-bottom: 6px; letter-spacing: 0.25em; }
    }

    @media (max-width: 260px) {
        .led-clock-widget {
            padding: 8px 4px 6px;
            border-radius: 8px;
            --digit-width: 22px;
            --digit-height: 36px;
            --digit-gap: 2px;
            --colon-width: 7px;
            --h-seg-width: 17px;
            --h-seg-height: 3px;
            --v-seg-width: 3px;
            --v-seg-height: 13px;
        }
        .led-segment { border-radius: 1px; }
        .led-segment.seg-a { top: 1px; left: 2.5px; }
        .led-segment.seg-b { top: 2px; left: 18px; }
        .led-segment.seg-c { top: 17px; left: 18px; }
        .led-segment.seg-d { top: 30px; left: 2.5px; }
        .led-segment.seg-e { top: 17px; left: 1px; }
        .led-segment.seg-f { top: 2px; left: 1px; }
        .led-segment.seg-g { top: 15px; left: 2.5px; }
        .led-colon-dot { width: 3px; height: 3px; }
        .led-colon { gap: 7px; }
        .led-clock-date { font-size: 7px; margin-top: 6px; letter-spacing: 0.08em; }
        .led-clock-label { font-size: 6px; margin-bottom: 4px; letter-spacing: 0.15em; }
    }
</style>

<style>
    #TableOfContents > ul, ol {
        ul, ol {
            display: none;
        }
        .open {
            display: block;
        }
    }
</style>

<script>
    function initTocHide() {
        
        let toc = document.querySelector(".widget--toc");
        if (!toc) {
            return;
        }
        
        window.addEventListener('scroll', function() {
            
            let openUl = document.querySelectorAll(".open");
            if (openUl.length > 0) {
              openUl.forEach((ul) => {
                ul.classList.remove("open")
              })
            }
            
            let currentLi = document.querySelector(".active-class");
            if (!currentLi) {
                return
            }
            
            if (currentLi.children.length > 1) {
                currentLi.children[1].classList.add("open")
            }
            
            let ul = currentLi.parentElement;
            do {
                ul.classList.add("open");
                ul = ul.parentElement.parentElement
            } while (ul !== undefined && (ul.localName === 'ul' || ul.localName === 'ol'))
        });
    }
    initTocHide()
</script>

<style>
    #backTopBtn {
        display: none;
        position: fixed;
        bottom: 30px;
        z-index: 99;
        cursor: pointer;
        width: 30px;
        height: 30px;
        background-image: url(http://localhost:1313/icons/backTop.svg);
    }
</style>

<script>
    

    function initScrollTop() {
        let rightSideBar = document.querySelector(".right-sidebar");
        if (!rightSideBar) {
            return;
        }
        
        let btn = document.createElement("div");
        btn.id = "backTopBtn";
        btn.onclick = backToTop
        rightSideBar.appendChild(btn)
        
        window.onscroll = function() {
            
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        };
    }

    

    function backToTop(){
        window.scrollTo({ top: 0, behavior: "smooth" })
    }

    initScrollTop();
</script>
