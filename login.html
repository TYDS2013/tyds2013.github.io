<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 我的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 30px;
            background: var(--bg-container);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-container .form-group {
            margin-bottom: 16px;
        }
        .login-container .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .login-container .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .login-container .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-container .btn-login:hover {
            opacity: 0.85;
        }
        .login-container .status-msg {
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .login-container .status-msg.success {
            background: #dcfce7;
            color: #166534;
        }
        .login-container .status-msg.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .login-container .hint {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .login-container .hint a {
            color: var(--accent);
            cursor: pointer;
        }
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        .back-home a {
            color: var(--text-secondary);
            text-decoration: underline;
        }
    </style>
</head>
<body>
<!-- 加载动画遮罩（与全局一致） -->
<div id="loader">
    <svg class="pl" width="240" height="240" viewBox="0 0 240 240">
        <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
    </svg>
</div>

<div class="container" style="min-height: 80vh;">
    <div class="login-container">
        <h2>🔐 登录</h2>
        <div id="loginMsg" class="status-msg" style="display:none;"></div>
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="loginUsername" placeholder="请输入账号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        <button class="btn-login" onclick="handleLogin()">登录</button>
        <div class="hint">
            如果账号不存在，将自动创建。<br>
            <a href="javascript:void(0)" onclick="openRegister()">注册新账号</a>（自动创建）
        </div>
        <div class="back-home">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>
</div>

<script>
// ----- 复用 common.js 中的用户管理函数 -----
// 这里直接引用 common.js 已加载的函数，如果未加载则自行定义
// 我们假设 common.js 已包含 hashPassword, getUsers, saveUsers 等
// 如果 common.js 未加载，可以在这里重新定义

// 为了安全，我们检查函数是否存在，否则自包含
if (typeof hashPassword === 'undefined') {
    // 自包含哈希
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
}
if (typeof getUsers === 'undefined') {
    function getUsers() {
        const data = localStorage.getItem('users');
        return data ? JSON.parse(data) : {};
    }
    function saveUsers(users) {
        localStorage.setItem('users', JSON.stringify(users));
    }
}

// 显示消息
function showMsg(text, type) {
    const el = document.getElementById('loginMsg');
    el.textContent = text;
    el.className = 'status-msg ' + type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// 获取重定向地址
function getRedirect() {
    const params = new URLSearchParams(window.location.search);
    return params.get('redirect') || 'index.html';
}

// 登录处理
async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) {
        showMsg('请填写账号和密码', 'error');
        return;
    }

    const users = getUsers();
    let isNew = false;
    let userHash = null;

    if (users[username]) {
        userHash = users[username].hash;
    } else {
        // 自动创建
        isNew = true;
        const hashed = await hashPassword(password);
        users[username] = { hash: hashed, created: Date.now() };
        saveUsers(users);
        userHash = hashed;
    }

    if (!isNew) {
        const inputHash = await hashPassword(password);
        if (inputHash !== userHash) {
            showMsg('密码错误', 'error');
            return;
        }
    }

    // 登录成功，保存 session
    sessionStorage.setItem('loginUser', username);
    if (username === 'TYDS2013') {
        sessionStorage.setItem('isAdmin', 'true');
    } else {
        sessionStorage.removeItem('isAdmin');
    }

    // 跳转到重定向页面
    const redirect = getRedirect();
    window.location.href = redirect;
}

// 注册（直接调用登录，自动创建）
function openRegister() {
    // 引导用户填写账号密码，点击登录即自动创建
    document.getElementById('loginUsername').focus();
    showMsg('请填写账号和密码，点击登录即可自动注册', 'success');
}

// 页面加载完成后聚焦
document.addEventListener('DOMContentLoaded', function() {
    // 如果已登录，直接跳转
    if (sessionStorage.getItem('loginUser')) {
        window.location.href = getRedirect();
    }
    // 按回车提交
    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginUsername').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginPassword').focus();
    });
});
</script>

<script src="js/common.js"></script>
</body>
</html>
