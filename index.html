<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- 加载动画遮罩 -->
<div id="loader">
    <svg class="pl" width="240" height="240" viewBox="0 0 240 240">
        <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
    </svg>
</div>

<div class="container">
    <!-- 顶部栏 -->
    <div class="top-bar">
        <div id="clock"></div>
        <div class="theme-toggle" id="themeToggle">
            <button data-theme="light">☀️ 亮</button>
            <button data-theme="dark">🌙 暗</button>
        </div>
    </div>

    <!-- 导航 -->
    <nav class="top-nav">
        <a href="index.html" class="active">主页</a>
        <a href="all-articles.html">文章</a>
        <a href="about.html">关于</a>
        <a href="resources.html">资料</a>
        
        <span id="loginNav" style="margin-left:auto;"></span>
    </nav>

    <!-- 轮播图 -->
    <div class="carousel" id="carousel">
        <div class="carousel-slide active">
            <img src="https://picsum.photos/1400/400?random=1" alt="轮播图1">
        </div>
        <div class="carousel-slide">
            <img src="https://picsum.photos/1400/400?random=2" alt="轮播图2">
        </div>
        <div class="carousel-slide">
            <img src="https://picsum.photos/1400/400?random=3" alt="轮播图3">
        </div>
        <button class="carousel-arrow left" onclick="document.querySelector('.carousel-arrow.left')?.click()">‹</button>
        <button class="carousel-arrow right" onclick="document.querySelector('.carousel-arrow.right')?.click()">›</button>
        <div class="carousel-dots">
            <span class="active"></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- 最新文章 -->
    <div class="section-header">
        <h2>📝 最新文章</h2>
        <a href="all-articles.html" class="more-link">查看全部 →</a>
    </div>
    <div class="post-grid" id="postGrid"></div>

    <!-- B站视频 -->
    <div class="section-header">
        <h2>🎬 推荐视频</h2>
    </div>
    <div class="video-grid">
        <iframe src="https://player.bilibili.com/player.html?bvid=BV1GJ411x7M6&page=1" allowfullscreen></iframe>
        <iframe src="https://player.bilibili.com/player.html?bvid=BV1Qy4y1Q7Tj&page=1" allowfullscreen></iframe>
    </div>



    <!-- 底部 -->
    <div class="footer">
        © 2026 我的个人博客 · 保留所有权利
        <div class="update-date">最后更新：<span id="updateDate"></span></div>
    </div>
</div>
<div id="backTop">↑</div>
<script src="js/common.js"></script>
<script src="js/index.js"></script>
<script>
    document.getElementById('updateDate').textContent = new Date().toLocaleDateString('zh-CN');
</script>
</body>
</html>
