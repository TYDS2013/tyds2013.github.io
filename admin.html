<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城建一局的小站 - 后台管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 后台专属样式 */
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .admin-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .admin-card h3 { margin-bottom: 12px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .btn { padding: 8px 20px; border: none; border-radius: 30px; cursor: pointer; font-weight: 500; transition: 0.15s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { opacity: 0.8; }
        .btn-danger { background: #e11d48; color: white; }
        .btn-danger:hover { background: #be123c; }
        .btn-secondary { background: var(--nav-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--border-color); }
        .post-item-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .post-item-admin .actions button { margin-left: 8px; }
        .status-msg { padding: 8px 16px; border-radius: 8px; margin: 10px 0; }
        .status-msg.success { background: #dcfce7; color: #166534; }
        .status-msg.error { background: #fee2e2; color: #991b1b; }
        .hero-image h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: 2px; }
        .admin-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-top-bar .logout-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .admin-top-bar .logout-btn:hover {
            background: var(--nav-bg);
        }
        .tag-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tag-input-group input { flex: 1; }
        .tag-input-group button { flex-shrink: 0; }
    </style>
</head>
<body>
<div id="loader"><!-- 加载动画 --></div>
<div class="container admin-container">
    <!-- 顶部标题 + 退出按钮 -->
    <div class="admin-top-bar">
        <div class="hero-image" style="height: auto; background: none; margin:0; padding:20px 0;">
            <h1 style="color:var(--text-primary);">🔐 后台管理</h1>
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">退出</button>
    </div>

    <!-- 登录区域（未登录时显示） -->
    <div id="loginArea" class="admin-card">
        <h3>管理员登录</h3>
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="loginUsername" placeholder="请输入管理员账号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        <button class="btn btn-primary" id="adminLoginBtn">登录</button>
        <div id="loginMsg" class="status-msg" style="display:none;"></div>
    </div>

    <!-- 仪表盘（登录后显示） -->
    <div id="dashboard" style="display:none;">
        <!-- GitHub 配置 -->
        <div class="admin-card config-section">
            <h3>⚙️ GitHub 配置</h3>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
            </div>
            <div class="form-group">
                <label>仓库 (owner/repo)</label>
                <input type="text" id="repoInfo" placeholder="owner/repo">
            </div>
            <div class="form-group">
                <label>分支</label>
                <input type="text" id="repoBranch" value="main">
            </div>
            <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
            <div id="configMsg" class="status-msg" style="display:none;"></div>
        </div>

        <!-- 数据概览：最近3篇文章 -->
        <div class="admin-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>📊 最近文章</h3>
                <a href="all-articles.html" class="btn btn-secondary">查看全部文章 →</a>
            </div>
            <div id="recentPosts"></div>
        </div>

        <!-- 新建文章 -->
        <div class="admin-card">
            <h3>✏️ 新建文章</h3>
            <form id="newPostForm">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="newTitle" placeholder="文章标题" required>
                </div>
                <div class="form-group">
                    <label>日期 (YYYY-MM-DD)</label>
                    <input type="text" id="newDate" placeholder="2026-07-20">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="newCategory">
                        <option value="uncategorized">未分类</option>
                    </select>
                    <div class="tag-input-group" style="margin-top:8px;">
                        <input type="text" id="newTagInput" placeholder="新建标签">
                        <button type="button" class="btn btn-secondary" onclick="addNewTag()">添加</button>
                    </div>
                </div>
                <button type="button" class="btn btn-primary" onclick="createAndEdit()">创建并编辑正文</button>
                <div id="newPostMsg" class="status-msg" style="display:none;"></div>
            </form>
        </div>

        <!-- 文章管理 -->
        <div class="admin-card">
            <h3>📝 文章管理</h3>
            <div id="adminPostList"></div>
        </div>
    </div>

    <div class="footer">© 2026 城建一局</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/common.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
