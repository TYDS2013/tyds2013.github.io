<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 与之前相同的样式，但去掉 auth-tabs 相关的，改用简单登录表单 */
        /* ... 保留原有样式，增加用户管理区域样式 ... */
        .user-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .user-item .del-btn {
            color: #e11d48;
            cursor: pointer;
            background: none;
            border: none;
        }
        .user-item .del-btn:hover { opacity: 0.7; }
        .admin-card .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .admin-card .form-row .form-group {
            flex: 1;
            min-width: 150px;
        }
    </style>
</head>
<body>
<div class="container admin-container">
    <div class="hero-image"><span>🔐 后台管理</span></div>
    <nav class="top-nav">
        <a href="index.html">主页</a>
        <a href="all-articles.html">文章</a>
        <a href="about.html">关于</a>
        <a href="resources.html">资料</a>
        
        <span id="loginNav" style="margin-left:auto;">
            <a href="login.html?redirect=当前页面路径" style="background:var(--accent); border:none; border-radius:30px; padding:4px 18px; cursor:pointer; color:#fff; font-weight:500; text-decoration:none;">登录</a>
        </span>
    </nav>

    <!-- 登录区域 (始终显示，登录后隐藏) -->
    <div id="loginArea" class="admin-card">
        <h3>管理员登录</h3>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="密码">
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">登录</button>
        <div id="loginMsg" class="status-msg" style="display:none;"></div>
    </div>

    <!-- 后台主面板（登录后显示） -->
    <div id="dashboard" style="display:none;">
        <!-- GitHub 配置 -->
        <div class="admin-card config-section">
            <h3>⚙️ GitHub 配置</h3>
            <!-- 配置表单同上 -->
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
            </div>
            <div class="form-group">
                <label>仓库 (owner/repo)</label>
                <input type="text" id="repoInfo" placeholder="owner/repo">
            </div>
            <div class="form-group">
                <label>分支</label>
                <input type="text" id="repoBranch" value="main">
            </div>
            <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
            <div id="configMsg" class="status-msg" style="display:none;"></div>
        </div>

        <!-- 用户管理 (仅管理员) -->
        <div class="admin-card">
            <h3>👥 用户管理</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>新用户名</label>
                    <input type="text" id="newUsername" placeholder="用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="newPassword" placeholder="密码">
                </div>
                <button class="btn btn-primary" onclick="addUser()">添加用户</button>
            </div>
            <div id="userList" style="margin-top:16px;"></div>
            <div id="userMsg" class="status-msg" style="display:none;"></div>
        </div>

        <!-- 用户管理 -->
        <div class="admin-card">
            <h3>👥 用户管理</h3>
            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
                <input type="text" id="newUsername" placeholder="新用户名" style="flex:1; min-width:120px; padding:6px 12px; border:1px solid var(--border-color); border-radius:8px; background:var(--input-bg); color:var(--text-primary);">
                <input type="password" id="newPassword" placeholder="密码" style="flex:1; min-width:120px; padding:6px 12px; border:1px solid var(--border-color); border-radius:8px; background:var(--input-bg); color:var(--text-primary);">
                <button class="btn btn-primary" onclick="addUser()">添加用户</button>
            </div>
            <div id="userList"></div>
            <div id="userMsg" class="status-msg" style="display:none;"></div>
        </div>

        <!-- 数据概览 -->
        <div class="admin-card">
            <h3>📊 数据概览</h3>
            <p><strong>总浏览数：</strong> <span id="viewCount">0</span></p>
            <p><strong>文章总数：</strong> <span id="postCount">0</span></p>
        </div>

        <!-- 评论列表 -->
        <div class="admin-card">
            <h3>💬 评论列表</h3>
            <div id="adminComments"><p>暂无评论</p></div>
        </div>

        <!-- 文章管理 -->
        <div class="admin-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>📝 文章管理</h3>
                <button class="btn btn-primary" onclick="openEditor()">+ 新建文章</button>
            </div>
            <div id="adminPostList"></div>
        </div>

        <button class="btn btn-secondary" onclick="logoutAdmin()" style="margin-top:20px;">退出登录</button>
    </div>

    <div class="footer">© 2026 我的个人博客 · 保留所有权利</div>
</div>

<!-- 文章编辑器模态框 (与之前相同) -->
<div id="editorModal" class="modal"> ... </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/common.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
