<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部文章</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="loader">
    <svg class="pl" width="240" height="240" viewBox="0 0 240 240">
        <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
    </svg>
</div>

<div class="container">
    <div class="top-bar">
        <div id="clock"></div>
        
    </div>
    <nav class="top-nav">
        <a href="index.html">主页</a>
        <a href="all-articles.html" class="active">文章</a>
        <a href="about.html">关于</a>
        <a href="resources.html">资料</a>
        
        <span id="loginNav" style="margin-left:auto;"></span>
    </nav>
    <div class="section-header">
        <h2>📚 全部文章</h2>
    </div>
    <div class="post-grid" id="allPostGrid"></div>
    <div class="footer">
        <div class="footer">
    <div class="footer-content">
        <span>© 2026 城建一局 </span>
        <div class="theme-switch-wrapper">
            <span class="theme-label">🌙</span>
            <label class="theme-switch">
                <input type="checkbox" id="themeToggleCheckbox">
                <span class="slider"></span>
            </label>
            <span class="theme-label">☀️</span>
        </div>
    </div>
    <div class="update-date">最后更新：<span id="updateDate"></span></div>
</div>
    </div>
</div>
<div id="backTop">↑</div>
<script src="js/common.js"></script>
<script>
    async function loadAllPosts() {
        try {
            const res = await fetch('post/posts.json?' + Date.now());
            const posts = await res.json();
            const grid = document.getElementById('allPostGrid');
            const views = JSON.parse(localStorage.getItem('views') || '{}');
            if (!posts.length) {
                grid.innerHTML = '<p>暂无文章</p>';
                return;
            }
            grid.innerHTML = posts.map(p => `
                <div class="post-card">
                    <h3><a href="article.html?id=${p.id}">${p.title}</a></h3>
                    <div class="meta">
                        <span>📅 ${p.date}</span>
                        <span>✍️ ${p.author || '博客作者'}</span>
                        <span>👁️ ${views[p.id] || 0}</span>
                    </div>
                    <div class="excerpt">${p.excerpt}</div>
                </div>
            `).join('');
        } catch(e) {
            console.error('加载失败', e);
        }
    }
    document.addEventListener('DOMContentLoaded', loadAllPosts);
    document.getElementById('updateDate').textContent = new Date().toLocaleDateString('zh-CN');
</script>
</body>
</html>
