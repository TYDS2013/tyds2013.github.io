<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="loader">
    <svg class="pl" width="240" height="240" viewBox="0 0 240 240">
        <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
        <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"></circle>
    </svg>
</div>

<div class="container">
    <div class="top-bar">
        <div id="clock"></div>
        
    </div>
    <nav class="top-nav">
        <a href="index.html">主页</a>
        <a href="all-articles.html">文章</a>
        <a href="about.html">关于</a>
        <a href="resources.html">资料</a>
        
        <span id="loginNav" style="margin-left:auto;"></span>
    </nav>

    <div id="articleContainer">
        <div class="article-title" id="articleTitle">加载中...</div>
        <div class="post-meta" id="articleMeta"></div>
        <div class="article-content" id="articleContent"></div>
        <a href="index.html" class="back-link">← 返回列表</a>
    </div>

    <div class="comment-section">
        <h4>💬 评论区</h4>
        <div class="comment-form">
            <input type="text" id="commentUser" placeholder="你的昵称 (首次请创建, 不可重复)">
            <textarea id="commentText" rows="3" placeholder="写下你的想法..."></textarea>
            <button id="submitComment">发布评论</button>
        </div>
        <div class="comment-list" id="commentList"></div>
    </div>

    

    <div class="footer">
        <div class="footer">
    <div class="footer-content">
        <span>© 2026 城建一局 </span>
        <div class="theme-switch-wrapper">
            <span class="theme-label">🌙</span>
            <label class="theme-switch">
                <input type="checkbox" id="themeToggleCheckbox">
                <span class="slider"></span>
            </label>
            <span class="theme-label">☀️</span>
        </div>
    </div>
    <div class="update-date">最后更新：<span id="updateDate"></span></div>
</div>
    </div>
</div>
<div id="backTop">↑</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/common.js"></script>
<script src="js/article.js"></script>
<script>
    document.getElementById('updateDate').textContent = new Date().toLocaleDateString('zh-CN');
</script>
</body>
</html>
